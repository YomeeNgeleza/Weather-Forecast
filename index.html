<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />

    <title>Weather App</title>
  </head>
  <body>
    <div class="weatherapp">
      <header>
        <form class="search-form">
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="search-form-input"
          />
          <input type="submit" value="search" class="search-form-button" />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city">Johanesburg</h1>

            <p class="weather-app-details">
              Tuesday 12:00, Sunny
              <br />
              Humidity: <strong>70%</strong>, Wind: <strong>2.14km/h</strong>
            </p>
          </div>
          <div class="weather-app-container">
            <div class="weather-app-icon">☀️</div>
            <div class="weather-app-temperature">25</div>
            <div class="weather-app-celsius">℃</div>
          </div>
        </div>
      </main>
      <footer>
        Coded by
        <a href="https://github.com/YomeeNgeleza" target="_blank"
          >Yomelela Ngeleza</a
        >
        code hosted on
        <a
          href="https://github.com/YomeeNgeleza?tab=repositories"
          target="_blank"
          >GitHub</a
        >
        and website hosted on
        <a href="https://izulu-shecodes-app.netlify.app" target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
  </body>
</html>
